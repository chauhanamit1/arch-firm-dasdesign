# SonarQube Project Configuration

# Project identification
sonar.projectKey=architectural-firm-website
sonar.projectName=Architectural Firm Website
sonar.projectVersion=1.0.0

# Source code location
sonar.sources=backend/src,frontend/src
sonar.tests=backend/tests,frontend/__tests__,frontend/cypress

# Exclusions
sonar.exclusions=**/node_modules/**,**/*.spec.ts,**/*.test.ts,**/*.test.tsx,**/dist/**,**/build/**,**/.next/**,**/coverage/**,**/public/**

# Test coverage
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info,frontend/coverage/lcov.info
sonar.typescript.lcov.reportPaths=backend/coverage/lcov.info,frontend/coverage/lcov.info

# Language
sonar.language=js,ts

# Encoding
sonar.sourceEncoding=UTF-8

# Code analysis parameters
sonar.javascript.node.maxspace=4096
sonar.typescript.node.maxspace=4096

# Duplication detection
sonar.cpd.exclusions=**/*.test.ts,**/*.spec.ts,**/*.test.tsx

# Issue exclusions
sonar.issue.ignore.multicriteria=e1,e2

# Exclude test files from certain rules
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S1186
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.test.ts

# Exclude generated files
sonar.issue.ignore.multicriteria.e2.ruleKey=*
sonar.issue.ignore.multicriteria.e2.resourceKey=**/.next/**

# Quality gate
sonar.qualitygate.wait=true

